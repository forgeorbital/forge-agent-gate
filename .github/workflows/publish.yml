name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gated: publishing pauses here until a required reviewer approves the
    # deployment, so a tag push alone cannot silently ship a release.
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Node 24 ships npm 11.x, which supports trusted publishing (needs >= 11.5.1)
      # and has the bundled sigstore deps required for provenance. Do NOT
      # `npm i -g npm@latest` over the toolcache: it breaks provenance.js.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Versions
        run: node -v && npm -v

      - name: Install deps
        run: npm ci

      # prepublishOnly runs build + test. OIDC supplies identity, no token.
      - name: Publish
        run: npm publish --access public
