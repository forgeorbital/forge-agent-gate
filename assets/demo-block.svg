<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <rect width="760" height="330" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <rect y="24" width="760" height="12" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="17" r="6" fill="#27c93f"/>
  <text x="380" y="22" fill="#8b949e" text-anchor="middle" font-size="13">forge-agent-gate</text>
  <text x="24" y="72" fill="#8b949e">$ <tspan fill="#e6edf3">node examples/blocked-over-cap.mjs</tspan></text>
  <text x="24" y="108" fill="#8b949e"># the agent proposes a $4,000 transfer against a $500 cap</text>
  <text x="24" y="150" fill="#e6edf3">$4,000 transfer  <tspan fill="#8b949e">-&gt;</tspan>  <tspan fill="#ff7b72" font-weight="bold">BLOCK</tspan></text>
  <text x="52" y="180" fill="#8b949e">- Action magnitude $4000.00 exceeds cap $500.00.</text>
  <text x="52" y="204" fill="#8b949e">- Action magnitude $4000.00 is at/above the approval threshold $2500.00.</text>
  <text x="24" y="248" fill="#e6edf3">$50 transfer     <tspan fill="#8b949e">-&gt;</tspan>  <tspan fill="#3fb950" font-weight="bold">ALLOW</tspan></text>
  <text x="24" y="298" fill="#6e7681" font-size="13">local enforcement, no API key, no signup, deterministic</text>
</svg>
